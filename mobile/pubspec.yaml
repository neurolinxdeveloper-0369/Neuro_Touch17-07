name: neuro_touch
description: Neuro Touch - Smart Home Automation Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7
  dio: ^5.4.3+1
  mqtt_client: ^10.0.0
  flutter_secure_storage: ^9.2.2
  hive_flutter: ^1.1.0
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  fl_chart: ^0.68.0
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.0
  webview_flutter: ^4.8.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3
  wifi_scan: ^0.4.1
  network_info_plus: ^6.0.1
  permission_handler: ^11.3.1
  flutter_local_notifications: ^17.2.4
  http: ^1.2.2
  intl: ^0.19.0
  uuid: ^4.4.0
  equatable: ^2.0.5
  flutter_animate: ^4.5.0
  gap: ^3.0.1
  url_launcher: ^6.3.1
  image_picker: ^1.1.2
  share_plus: ^10.0.0
  clipboard: ^0.1.3
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1
  image: ^4.8.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo_padded.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  adaptive_icon_background: "#121212"
  adaptive_icon_foreground: "assets/images/logo_padded.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/data/
    - assets/google_fonts/
    - assets/Icons/
